name: e_commerce
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.7.2

#-----------------[Packages]-------------------
dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8

# Utilities
  flutter_native_splash: ^2.4.6
  lottie: ^3.3.1
  smooth_page_indicator: ^1.0.0
  iconsax: ^0.0.8
  expandable: ^5.0.1
  carousel_slider: ^5.1.2
  connectivity_plus: ^7.1.1
  shimmer: ^3.0.0

# State Management
  get: ^4.7.3
  get_storage: ^2.1.1
  
# Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  
  
  


#----------------------------------------------------------

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0



flutter:

  uses-material-design: true


  #-----------------[Assets]-------------------
  assets:
    - assets/logo/
    - assets/animations/
    - assets/images/
    - assets/icons/categories/
    - assets/icons/payment_methods/
    - assets/banners/
    - assets/products/
    - assets/brands/



  #-----------------[Fonts]-------------------
  fonts:
   - family: 'Nunito'
     fonts:
       - asset: assets/fonts/Nunito-Light.ttf
         weight: 300
       - asset: assets/fonts/Nunito-Bold.ttf
         weight: 800
       - asset: assets/fonts/Nunito-Italic.ttf
         style: italic
       - asset: assets/fonts/Nunito-Medium.ttf
         weight: 500
       - asset: assets/fonts/Nunito-MediumItalic.ttf
         weight: 500
       - asset: assets/fonts/Nunito-Regular.ttf
         weight: 400
       - asset: assets/fonts/Nunito-SemiBold.ttf
         weight: 600

