name: e_commerce
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.7.2

#-----------------[Packages]-------------------
dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8

# Utilities
  flutter_native_splash: ^2.4.6
  lottie: ^3.3.1
  smooth_page_indicator: ^1.0.0
  iconsax: ^0.0.8

# State Management
  get: ^4.7.3


#----------------------------------------------------------

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0



flutter:

  uses-material-design: true


  #-----------------[Assets]-------------------
  assets:
    - assets/logo/
    - assets/animations/
    - assets/images/



  #-----------------[Fonts]-------------------
  fonts:
   - family: 'Nunito'
     fonts:
       - asset: assets/fonts/Nunito-Light.ttf
         weight: 300
       - asset: assets/fonts/Nunito-Bold.ttf
         weight: 800
       - asset: assets/fonts/Nunito-Italic.ttf
         style: italic
       - asset: assets/fonts/Nunito-Medium.ttf
         weight: 500
       - asset: assets/fonts/Nunito-MediumItalic.ttf
         weight: 500
       - asset: assets/fonts/Nunito-Regular.ttf
         weight: 400
       - asset: assets/fonts/Nunito-SemiBold.ttf
         weight: 600

